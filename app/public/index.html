<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog | MongoDB Exercise</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            background: #999999; 
            color: #000000; 
            line-height: 1.2; 
            margin: 0; 
            padding: 10px;
        }
        .container { 
            max-width: 100%; 
            margin: 0 auto; 
            background: #cccccc;
            border: 3px solid #666666;
            padding: 15px;
        }
        header { 
            margin-bottom: 15px;
            border-bottom: 2px solid #666666;
            padding-bottom: 10px;
        }
        header h1 {
            margin: 0;
            font-size: 28px;
            color: #333333;
        }
        #authStatus {
            font-size: 12px;
            margin-top: 5px;
        }
        .card { 
            background: #dddddd; 
            padding: 10px; 
            border: 1px solid #999999;
            margin-bottom: 15px;
        }
        form { 
            display: block;
        }
        input, textarea, select { 
            padding: 5px; 
            border: 1px solid #999999; 
            font-size: 13px;
            background: #eeeeee;
            margin-bottom: 8px;
            width: 95%;
            font-family: Arial, sans-serif;
        }
        .entry { 
            border-left: 3px solid #666666;
            padding-left: 10px;
            margin-bottom: 20px;
        }
        .entry h2 { 
            margin: 5px 0; 
            color: #333333;
            font-size: 18px;
        }
        .entry-meta { 
            font-size: 11px; 
            color: #666666; 
            margin-bottom: 8px;
        }
        .entry-content img { 
            width: 100%; 
            max-height: 300px; 
            object-fit: cover; 
            margin-top: 8px;
            border: 1px solid #999999;
        }
        .auth-section { 
            display: block;
            margin-bottom: 20px;
        }
        .auth-section .card {
            display: inline-block;
            width: 48%;
            margin-right: 2%;
            vertical-align: top;
        }
        .hidden { 
            display: none; 
        }
        #userBadge { 
            font-weight: bold; 
            color: #333333;
        }
        #logoutBtn {
            margin-left: 10px;
        }
        .category-tag {
            display: inline-block;
            background: #999999;
            color: #ffffff;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
            border: 1px solid #666666;
        }
        hr {
            border: 1px solid #666666;
            background: #999999;
            height: 2px;
            margin: 20px 0;
        }
        label {
            display: block;
            width: auto;
            margin-bottom: 8px;
        }
        label input[type="checkbox"] {
            width: auto;
            margin-bottom: 0;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://www.publicdomainpictures.net/pictures/120000/velka/austria-flag.jpg" height="100rem" style="float: right;"/>
        <h1>DevBlog</h1>
        <div id="authStatus">
            <span id="userBadge">Nicht eingeloggt</span>
            <button onclick="logout()" id="logoutBtn" class="hidden" style="padding: 5px 10px; margin-left:10px">Logout</button>
        </div>
    </header>

    <section id="loginArea" class="auth-section">
        <div class="card">
            <h3>Registrieren</h3>
            <form id="registerForm">
                <input type="text" id="regUser" placeholder="Username (ID)" required>
                <input type="text" id="regDisplay" placeholder="Anzeigename" required>
                <input type="password" id="regPass" placeholder="Passwort" required>
                <input type="date" id="regBirth" required>
                <input type="text" id="regCountry" placeholder="Land (Optional)">
                <button type="submit">Account erstellen</button>
            </form>
        </div>
        <div class="card">
            <h3>Login</h3>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="Username" required>
                <input type="password" id="loginPass" placeholder="Passwort" required>
                <button type="submit">Anmelden</button>
            </form>
        </div>
    </section>

    <section id="editorArea" class="card hidden">
        <h3>Neuen Blog-Beitrag schreiben</h3>
        <form id="blogForm">
            <input type="text" id="title" placeholder="Titel des Beitrags" required>
            
            <div style="display: flex; gap: 10px; align-items: center;">
                <select id="categorySelect" style="flex-grow: 1;">
                    <option value="">Keine Kategorie</option>
                </select>
                <input type="text" id="newCategoryName" placeholder="Neue Kat..." style="width: 120px;">
                <button type="button" onclick="addNewCategory()" style="width: 40px; padding: 5px;">+</button>
            </div>

            <textarea id="desc" placeholder="Kurze Beschreibung" rows="2" required></textarea>
            <textarea id="textContent" placeholder="Dein Text..." rows="5" required></textarea>
            <input type="text" id="links" placeholder="Links (mit Komma trennen)">
            <label>Bilder hochladen (Base64):</label>
            <input type="file" id="imageInput" accept="image/*" multiple>
            <label><input type="checkbox" id="allowComments" checked> Kommentare erlauben</label>
            <button type="submit">Beitrag veröffentlichen</button>
        </form>
    </section>

    <hr>

    <div id="blogEntries">
        <p>Lade Beiträge...</p>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:5000/api';
    let currentUser = JSON.parse(localStorage.getItem('user'));
    let categoryMap = {};

    async function loadCategories() {
        try {
            const res = await fetch(`${API_URL}/categories`);
            const categories = await res.json();
            const select = document.getElementById('categorySelect');
            
            select.innerHTML = '<option value="">Keine Kategorie</option>';
            categoryMap = {}; 

            categories.forEach(cat => {
                categoryMap[cat._id] = cat.category;

                const opt = document.createElement('option');
                opt.value = cat._id;
                opt.textContent = cat.category;
                select.appendChild(opt);
            });
        } catch (err) {
            console.error("Kategorien laden fehlgeschlagen", err);
        }
    }

    // --- HELPER FUNCTIONS ---
    function escapeHTML(str) {
        if (!str) return "";
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    }

    function ensureAbsoluteUrl(url) {
        if (!url) return "";
        if (!/^https?:\/\//i.test(url)) return 'https://' + url;
        return url;
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- UI LOGIC ---
    function updateUI() {
        if (currentUser) {
            document.getElementById('userBadge').innerText = `Hallo, ${currentUser.displayName}`;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('editorArea').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
        } else {
            document.getElementById('userBadge').innerText = "Gast-Modus";
            document.getElementById('loginArea').classList.remove('hidden');
            document.getElementById('editorArea').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        }
    }

    function logout() {
        localStorage.removeItem('user');
        location.reload();
    }

    // --- API CALLS ---

    // 1. Load Entries (Repariert!)
    async function loadEntries() {
        try {
            const res = await fetch(`${API_URL}/entries`);
            const data = await res.json();
            const container = document.getElementById('blogEntries');
            
            if (!data || data.length === 0) {
                container.innerHTML = "<p>Noch keine Beiträge vorhanden.</p>";
                return;
            }

            container.innerHTML = data.map(e => {
                const safeTitle = escapeHTML(e.title);
                const safeDesc = escapeHTML(e.description);
                const safeText = escapeHTML(e.content?.text);
                const safeAuthor = escapeHTML(e.authorId);
                
                // Kategorie-Name aus der Map holen
                const categoryName = e.categoryId ? categoryMap[e.categoryId] : null;
                const categoryTag = categoryName 
                    ? `<span class="category-tag">${escapeHTML(categoryName)}</span>` 
                    : '';

                return `
                    <div class="card entry">
                        <h2>${safeTitle} ${categoryTag}</h2>
                        <div class="entry-meta">
                            Von <strong>${safeAuthor || 'System'}</strong> • 
                            ${new Date(e.creationDate).toLocaleDateString()} • 
                            Aufrufe: ${e.impressionCount}
                        </div>
                        <p><em>${safeDesc}</em></p>
                        <div class="entry-content">
                            <p>${safeText}</p>
                            ${e.content?.images?.map(img => `<img src="${img}">`).join('') || ''}
                            <div style="margin-top:15px">
                                ${e.content?.links?.map(l => {
                                    const absoluteUrl = ensureAbsoluteUrl(l);
                                    return `<a href="${absoluteUrl}" target="_blank" rel="noopener noreferrer" style="margin-right:10px">${escapeHTML(l)}</a>`;
                                }).join('') || ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (err) {
            console.error("Fehler beim Laden:", err);
        }
    }

    // 2. Login
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        try {
            const res = await fetch(`${API_URL}/users/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('loginUser').value,
                    password: document.getElementById('loginPass').value
                })
            });
            const data = await res.json();
            if(data.success) {
                currentUser = data.user;
                localStorage.setItem('user', JSON.stringify(data.user));
                updateUI();
            } else alert("Login fehlgeschlagen!");
        } catch (err) { alert("Server nicht erreichbar"); }
    };

    // 3. Register
    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch(`${API_URL}/users/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('regUser').value,
                displayName: document.getElementById('regDisplay').value,
                password: document.getElementById('regPass').value,
                birthday: document.getElementById('regBirth').value,
                country: document.getElementById('regCountry').value
            })
        });
        if(res.ok) alert("Registrierung erfolgreich! Bitte jetzt einloggen.");
        else alert("Fehler bei Registrierung.");
    };

    // 4. Create Entry
    document.getElementById('blogForm').onsubmit = async (e) => {
        e.preventDefault();
        const imageFiles = document.getElementById('imageInput').files;
        const base64Images = [];
        for(let file of imageFiles) base64Images.push(await toBase64(file));

        const payload = {
            title: document.getElementById('title').value,
            description: document.getElementById('desc').value,
            commentsAllowed: document.getElementById('allowComments').checked,
            authorId: currentUser.username,
            categoryId: document.getElementById('categorySelect').value, // ID aus Dropdown
            content: {
                text: document.getElementById('textContent').value,
                links: document.getElementById('links').value.split(',').map(l => l.trim()).filter(l => l !== ""),
                images: base64Images
            }
        };

        const res = await fetch(`${API_URL}/entries`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) location.reload();
        else {
            const errData = await res.json();
            alert("Fehler: " + (errData.details || "Schema-Validierung fehlgeschlagen"));
        }
    };

    // --- Kategorien laden ---
    async function loadCategories() {
        try {
            const res = await fetch(`${API_URL}/categories`);
            const categories = await res.json();
            const select = document.getElementById('categorySelect');
            
            // Zurücksetzen außer der ersten Option
            select.innerHTML = '<option value="">Keine Kategorie</option>';
            
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat._id;
                opt.textContent = cat.category;
                select.appendChild(opt);
            });
        } catch (err) {
            console.error("Kategorien laden fehlgeschlagen", err);
        }
    }

    // --- Kategorie hinzufügen ---
    async function addNewCategory() {
        const name = document.getElementById('newCategoryName').value.trim();
        if (!name) return alert("Name eingeben!");

        try {
            const res = await fetch(`${API_URL}/categories`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category: name })
            });

            if (res.ok) {
                document.getElementById('newCategoryName').value = "";
                await loadCategories(); // Liste neu laden
                alert("Kategorie erstellt!");
            }
        } catch (err) {
            alert("Fehler beim Erstellen der Kategorie");
        }
    }

    // --- INIT ---
    async function init() {
        updateUI();
        await loadCategories(); 
        await loadEntries();
    }

    init();
</script>

</body>
</html>

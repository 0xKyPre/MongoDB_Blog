version: '3.8'

services:
  mongodb:
    image: mongodb/mongodb-community-server:latest
    container_name: blog_db
    ports:
      - 27018:27017
    environment:
      MONGO_INITDB_DATABASE: blogDB
    volumes:
      - blog-db:/data/db
    networks:
      - blog-network

volumes:
  blog-db:

networks:
  blog-network:

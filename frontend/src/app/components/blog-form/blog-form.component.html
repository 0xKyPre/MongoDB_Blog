<div class="form-container">
  <h1>{{ isEdit ? 'Edit Blog Entry' : 'Create New Blog Entry' }}</h1>

  <div *ngIf="submitError" class="error">{{ submitError }}</div>

  <form (ngSubmit)="submitForm()" class="blog-form">
    <div class="form-group">
      <label for="title">Title *</label>
      <input
        id="title"
        [(ngModel)]="form.title"
        name="title"
        type="text"
        required />
    </div>

    <div class="form-group">
      <label for="author">Author *</label>
      <select id="author" [(ngModel)]="form.author" name="author" required>
        <option [ngValue]="null">Select an author</option>
        <option
          *ngFor="let user of users"
          [ngValue]="{ _id: user._id, username: user.username }">
          {{ user.name.firstname }} {{ user.name.lastname }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        [(ngModel)]="form.description"
        name="description"></textarea>
    </div>

    <div class="form-group">
      <label for="categories">Categories (comma-separated)</label>
      <input
        id="categories"
        [(ngModel)]="categoriesString"
        name="categories"
        type="text"
        placeholder="tech, travel, food" />
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" [(ngModel)]="form.commentsAllowed" name="comments" />
        Allow Comments
      </label>
    </div>

    <div class="content-section">
      <h3>Content</h3>

      <div *ngIf="imageError" class="error-banner">{{ imageError }}</div>

      <div class="content-blocks">
        <div *ngFor="let block of contentBlocks; let i = index" class="content-block">
          <div class="block-header">
            <select
              [(ngModel)]="block.type"
              [name]="'type-' + i">
              <option value="text">Text</option>
              <option value="link">Link</option>
              <option value="image">Image</option>
            </select>
            <button type="button" (click)="removeContentBlock(i)" class="btn-remove">
              Remove
            </button>
          </div>

          <!-- Text Input -->
          <input
            *ngIf="block.type !== 'image'"
            [(ngModel)]="block.data"
            [name]="'data-' + i"
            type="text"
            [placeholder]="'Enter ' + block.type"
            required />

          <!-- Image Upload -->
          <div *ngIf="block.type === 'image'" class="image-upload-container">
            <label class="image-upload-label">
              <input
                type="file"
                accept="image/*"
                (change)="onImagefileSelected($event, i)"
                [name]="'image-' + i"
                class="image-input" />
              <span class="upload-text">
                <span *ngIf="!block.data">📷 Click to select image</span>
                <span *ngIf="block.data">✓ Change image</span>
              </span>
            </label>

            <img
              *ngIf="block.data"
              [src]="block.data"
              alt="Preview"
              class="image-preview" />
          </div>
        </div>
      </div>

      <div class="add-buttons">
        <button type="button" (click)="addContentBlock('text')" class="btn-add">
          + Add Text
        </button>
        <button type="button" (click)="addContentBlock('link')" class="btn-add">
          + Add Link
        </button>
        <button type="button" (click)="addContentBlock('image')" class="btn-add">
          + Add Image
        </button>
      </div>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Saving...' : (isEdit ? 'Update Entry' : 'Create Entry') }}
      </button>
      <a routerLink="/blog-list" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
